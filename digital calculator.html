   <!DOCTYPE html>
<html>
<head>
    <title>Creative Digital Calculator</title>
    <link rel="stylesheet" href="digital calculator.css">
</head>
<body>

<div class="calculator">
    <h1> Digital Calculator</h1>

    <input type="number" id="num1" placeholder="Enter First Number">
    <input type="number" id="num2" placeholder="Enter Second Number">

    <div class="btns">
        <button onclick="calculate('+')"> Add</button>
        <button onclick="calculate('-')"> Sub</button>
        <button onclick="calculate('*')"> Mul</button>
        <button onclick="calculate('/')"> Div</button>
    </div>

    <div id="result">Result</div>
</div>

<script src="digital calculator.js"></script>

</body>
</html>
